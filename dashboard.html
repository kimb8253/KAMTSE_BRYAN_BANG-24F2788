<div class="row mt-4">

    <!-- Average Marks -->
    <div class="col-md-4">
        <div class="card shadow text-center">
            <div class="card-header bg-primary text-white">
                Average Marks
            </div>
            <div class="card-body">
                <h3>
                    {% if avg_grade %}
                        {{ avg_grade|round(2) }}
                    {% else %}
                        No data yet
                    {% endif %}
                </h3>
            </div>
        </div>
    </div>

    <!-- Subjects Entered -->
    <div class="col-md-4">
        <div class="card shadow text-center">
            <div class="card-header bg-success text-white">
                Subjects Entered
            </div>
            <div class="card-body">
                <h3>{{ subject_count if subject_count else '0' }}</h3>
            </div>
        </div>
    </div>

    <!-- Upcoming Revisions -->
    <div class="col-md-4">
        <div class="card shadow text-center">
            <div class="card-header bg-warning text-dark">
                Upcoming Revisions
            </div>
            <div class="card-body">
                <h3>{{ revision_count if revision_count else '0' }}</h3>
            </div>
        </div>
    </div>

</div>

{% extends "base.html" %}
{% block title %}Delete Grade{% endblock %}
{% block content %}

<div class="section">
    <div class="card grades">
        <div class="card-header">Confirm Delete</div>
        <div class="card-body">

            <p class="mb-3">
                Are you sure you want to delete the grade for:
                <strong>{{ grade['subject'] }}</strong> (Score: {{ grade['score'] }})?
            </p>

            <form method="POST">
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{{ url_for('grades') }}" class="btn btn-light">Cancel</a>
            </form>

        </div>
    </div>
</div>

{% endblock %}

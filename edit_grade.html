{% extends "base.html" %}
{% block title %}Edit Grade{% endblock %}
{% block content %}

<div class="section">
    <div class="card grades shadow">
        <div class="card-header">Edit Grade</div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text" name="subject" class="form-control" value="{{ grade['subject'] }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Score</label>
                    <input type="number" name="score" class="form-control" value="{{ grade['score'] }}" required>
                </div>
                <button type="submit" class="btn btn-light">Save Changes</button>
                <a href="{{ url_for('grades') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>

{% endblock %}

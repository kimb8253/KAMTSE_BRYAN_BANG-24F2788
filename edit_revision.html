{% extends "base.html" %}
{% block title %}Edit Revision{% endblock %}
{% block content %}

<div class="section">
    <div class="card revisions shadow">
        <div class="card-header">Edit Revision Session</div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text" name="subject" class="form-control" value="{{ revision['subject'] }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" class="form-control" value="{{ revision['date'] }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Time</label>
                    <input type="time" name="time" class="form-control" value="{{ revision['time'] }}">
                </div>
                <button type="submit" class="btn btn-light">Save Changes</button>
                <a href="{{ url_for('revisions') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>

{% endblock %}

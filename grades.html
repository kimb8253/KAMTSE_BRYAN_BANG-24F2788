{% extends "base.html" %}
{% block title %}Grades{% endblock %}
{% block content %}

<div class="section">
    <div class="card grades shadow">
        <div class="card-header">Add Grade</div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text" name="subject" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Score</label>
                    <input type="number" name="score" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-light">Add Grade</button>
            </form>
        </div>
    </div>
</div>

<div class="section">
    <div class="card grades shadow">
        <div class="card-header">Grades Summary</div>
        <div class="card-body">
            <table class="table table-striped shadow-sm">
                <tr><th>Subject</th><th>Score</th><th>Action</th></tr>
                {% for g in grades %}
                <tr>
                    <td>{{ g['subject'] }}</td>
                    <td>{{ g['score'] }}</td>
                    <td>
                        <a href="{{ url_for('edit_grade', id=g['id']) }}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="{{ url_for('delete_grade', id=g['id']) }}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</div>

{% endblock %}

{% extends "base.html" %}
{% block title %}Revisions{% endblock %}
{% block content %}

<div class="section">
    <div class="card revisions shadow">
        <div class="card-header">Add Revision Session</div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text" name="subject" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Time</label>
                    <input type="time" name="time" class="form-control">
                </div>
                <button type="submit" class="btn btn-light">Add Revision</button>
            </form>
        </div>
    </div>
</div>

<div class="section">
    <div class="card revisions shadow">
        <div class="card-header">Revision Sessions</div>
        <div class="card-body">
            <table class="table table-striped shadow-sm">
                <tr><th>Subject</th><th>Date</th><th>Time</th><th>Action</th></tr>
                {% for r in revisions %}
                <tr>
                    <td>{{ r['subject'] }}</td>
                    <td>{{ r['date'] }}</td>
                    <td>{{ r['time'] }}</td>
                    <td>
                        <a href="{{ url_for('edit_revision', id=r['id']) }}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="{{ url_for('delete_revision', id=r['id']) }}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</div>

{% endblock %}

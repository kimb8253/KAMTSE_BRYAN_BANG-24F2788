{% extends "base.html" %}
{% block title %}Edit Grade{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">Edit Grade</div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label>Subject</label>
                <input type="text" name="subject" class="form-control" value="{{ grade['subject'] }}" required>
            </div>
            <div class="mb-3">
                <label>Score</label>
                <input type="number" name="score" class="form-control" value="{{ grade['score'] }}" required>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}

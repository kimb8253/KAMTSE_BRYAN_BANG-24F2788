{% extends "base.html" %}
{% block title %}Edit Grade{% endblock %}
{% block content %}
<div class="card shadow mt-4">
    <div class="card-header bg-warning text-dark">Edit Grade</div>
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Enter Subject</label>
                <input type="text" class="form-control" name="subject" value="{{ grade['subject'] }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Enter Marks</label>
                <input type="number" class="form-control" name="score" value="{{ grade['score'] }}" required>
            </div>
            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="{{ url_for('grades') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

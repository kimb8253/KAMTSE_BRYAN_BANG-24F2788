{% extends "base.html" %}
{% block title %}Edit Revision{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">Edit Revision</div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label>Subject</label>
                <input type="text" name="subject" class="form-control" value="{{ revision['subject'] }}" required>
            </div>
            <div class="mb-3">
                <label>Date</label>
                <input type="date" name="date" class="form-control" value="{{ revision['date'] }}" required>
            </div>
            <div class="mb-3">
                <label>Time</label>
                <input type="time" name="time" class="form-control" value="{{ revision['time'] }}" required>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}

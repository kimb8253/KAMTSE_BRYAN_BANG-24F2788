{% extends "base.html" %}
{% block title %}Grades{% endblock %}
{% block content %}
<div class="card shadow mt-4">
    <div class="card-header bg-primary text-white">
        Manage Grades
    </div>
    <div class="card-body">
        <!-- Form posts to the correct endpoint -->
        <form method="post" action="{{ url_for('grades') }}">
            <div class="mb-3">
                <label for="subject" class="form-label">Enter Subject</label>
                <input type="text" class="form-control" name="subject" placeholder="Enter Subject" required>
            </div>
            <div class="mb-3">
                <label for="score" class="form-label">Enter Marks</label>
                <input type="number" class="form-control" name="score" placeholder="Enter Marks" required>
            </div>
            <button type="submit" class="btn btn-success">Add Grade</button>
        </form>
    </div>
</div>

<div class="card shadow mt-4">
    <div class="card-header">Grades List</div>
    <div class="card-body">
        <table class="table table-striped">
            <tr><th>Subject</th><th>Score</th><th>Actions</th></tr>
            {% for g in grades %}
            <tr>
                <td>{{ g['subject'] }}</td>
                <td>{{ g['score'] }}</td>
                <td>
                    <a href="{{ url_for('edit_grade', id=g['id']) }}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="{{ url_for('delete_grade', id=g['id']) }}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="3">No grades yet</td></tr>
            {% endfor %}
        </table>
    </div>
</div>
{% endblock %}

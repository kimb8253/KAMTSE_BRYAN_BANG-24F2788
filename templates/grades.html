{% extends "base.html" %}
{% block title %}Grades{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">Manage Grades</div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('add_grade') }}" class="row g-3 mb-3">
            <div class="col-md-6 col-sm-12">
                <input type="text" name="subject" class="form-control" placeholder="Subject" required>
            </div>
            <div class="col-md-6 col-sm-12">
                <input type="number" name="score" class="form-control" placeholder="Score" required>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-success">Add Grade</button>
            </div>
        </form>

        <table class="table table-striped">
            <tr><th>Subject</th><th>Score</th><th>Action</th></tr>
            {% for g in grades %}
            <tr>
                <td>{{ g['subject'] }}</td>
                <td>{{ g['score'] }}</td>
                <td>
                    <a href="{{ url_for('edit_grade', id=g['id']) }}" class="btn btn-primary btn-sm">Edit</a>
                    <a href="{{ url_for('delete_grade', id=g['id']) }}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this grade?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
{% endblock %}
